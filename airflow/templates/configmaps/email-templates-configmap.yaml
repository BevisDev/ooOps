apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-email-templates
  labels:
    tier: airflow
    component: email-templates
    release: {{ .Release.Name }}
    chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    heritage: {{ .Release.Service }}
    {{- with .Values.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
data:
  content.html: |-
{{ .Files.Get "files/email_templates/content.html" | nindent 4 }}
  subject.txt: {{ .Files.Get "files/email_templates/subject.txt" | trim | quote }}
