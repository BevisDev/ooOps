# Bootstrap: <clusterName>-kafka-bootstrap.<namespace>.svc:9092
clusterName: kafka-cluster

nameOverride:

imagePullSecrets: []
  # - name: dockerhub-regcred

# Kafka configuration 
# doc: https://strimzi.io/docs/operators/latest/configuring.html#type-Kafka-reference
kafka:
  version: "4.2.0"
  metadata:
    labels: {}
    annotations:
      # enabled: https://strimzi.io/blog/2023/08/14/kafka-node-pools-introduction/
      strimzi.io/node-pools: enabled

  # 6.2 Specifying listener types
  # https://strimzi.io/docs/operators/latest/configuring.html#specifying_listener_types
  listeners:
    # - name: plain
    #   port: 9092
    #   type: internal
    #   tls: false
    - name: tls
      port: 9092
      type: internal
      tls: true
      # supported: tls | scram-sha-512 | custom
      authentication:
        type: scram-sha-512
    
  # 14. KafkaAuthorizationSimple schema reference
  # https://strimzi.io/docs/operators/latest/configuring.html#type-KafkaAuthorizationSimple-reference
  authorization:
    enabled: true
    type: simple
    superUsers:
      - User:admin

  # 5. KafkaClusterSpec schema reference
  # https://strimzi.io/docs/operators/latest/configuring.html#type-KafkaClusterSpec-reference
  # https://kafka.apache.org/43/configuration/broker-configs/
  config:
    auto.create.topics.enable: false
    # num replicas per partition
    default.replication.factor: 3
    # topic: __consumer_offsets: num replicas offsets topics
    offsets.topic.replication.factor: 3
    # min partitions created
    num.partitions: 3
    # min followers in-sync with leader
    min.insync.replicas: 2
    # __transaction_state: store state transaction kafka
    transaction.state.log.replication.factor: 3
    # min in-sync with leader
    transaction.state.log.min.isr: 2
    # time keeps messages
    log.retention.hours: 168

  # 19. JvmOptions schema reference
  # https://strimzi.io/docs/operators/latest/configuring.html#property-kafka-logging-reference
  jvmOptions:
    -Xms: 2g
    -Xmx: 2g

  # 5.2. Logging
  # https://strimzi.io/docs/operators/latest/configuring.html#property-kafka-logging-reference
  logging:
    type: inline
    loggers:
      rootLogger.level: INFO
      logger.requestlogger.level: WARN
      logger.requestchannel.level: WARN
      logger.authorizer.level: INFO

entityOperator:
  enabled: true
  
  # 45.2. EntityTopicOperatorSpec schema properties
  # https://strimzi.io/docs/operators/latest/configuring.html#type-EntityTopicOperatorSpec-schema-reference
  topicOperator:
    # Interval between periodic reconciliations in milliseconds.
    reconciliationIntervalMs: 300
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

  # 46.2. EntityUserOperatorSpec schema properties
  # https://strimzi.io/docs/operators/latest/configuring.html#type-EntityUserOperatorSpec-schema-reference
  userOperator:
    # Interval between periodic reconciliations in milliseconds.
    reconciliationIntervalMs: 300
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

# 58. KafkaExporterSpec schema reference
# doc: https://strimzi.io/docs/operators/latest/configuring.html#type-KafkaExporterSpec-reference
kafkaExporter:
  enabled: false

# 50. CruiseControlSpec schema reference
# doc: https://strimzi.io/docs/operators/latest/configuring.html#type-CruiseControlSpec-reference
cruiseControl:
  enabled: false

# kafka controller definitions
# https://strimzi.io/docs/operators/latest/configuring.html#type-KafkaNodePool-reference
controllers:
  replicas: 3
  storage:
    type: persistent-claim
    size: 20Gi
    class: longhorn
    deleteClaim: false
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi
  jvmOptions:
    -Xms: 1g
    -Xmx: 1g
  template:
    pod:
      imagePullSecrets:
        - name: dockerhub-regcred
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  strimzi.io/cluster: '{{ .Values.clusterName }}'
                  strimzi.io/pool-name: controllers
              topologyKey: kubernetes.io/hostname

# kafka brokers definitions
# https://strimzi.io/docs/operators/latest/configuring.html#type-KafkaNodePool-reference
brokers:
  replicas: 3
  storage:
    type: persistent-claim
    size: 100Gi
    class: longhorn
    deleteClaim: false
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      cpu: "4"
      memory: 8Gi
  jvmOptions:
    -Xms: 2g
    -Xmx: 2g
  template:
    pod:
      imagePullSecrets:
        - name: dockerhub-regcred
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  strimzi.io/cluster: '{{ .Values.clusterName }}'
                  strimzi.io/pool-name: brokers
              topologyKey: kubernetes.io/hostname

# 97. KafkaUser schema reference
# doc: https://strimzi.io/docs/operators/latest/configuring.html#type-KafkaUser-reference
# authentication.type: tls | scram-sha-512 | tls-external  
# authorization.type: simple
#
# 103. KafkaUserAuthorizationSimple schema reference
# doc: https://strimzi.io/docs/operators/latest/configuring.html#type-KafkaUserAuthorizationSimple-reference
#
# 104. AclRule schema reference
# doc: https://strimzi.io/docs/operators/latest/configuring.html#type-AclRule-reference
# resource.type: topic | group | cluster | transactionalId
# resource.patternType: literal | prefix
# literal: names are taken exactly as they are specified in the name field. 
# if set * to indicate that the rule applies to all resources.
#
# type: [allow, deny] default: allow
# operations: Read, Write, Create, Delete, Alter, Describe, ClusterAction, AlterConfigs, DescribeConfigs, IdempotentWrite and All.
#
# users: admin, ui (Kafka-UI), connect (Kafka-Connect)
users:
  - name: admin
    authentication:
      type: scram-sha-512

  # user for Kafka-UI
  - name: ui
    authentication:
      type: scram-sha-512
    authorization:
      type: simple
      acls:
        # --- Cluster metadata & config ---
        - resource:
            type: cluster
          operations:
            - Describe
            - DescribeConfigs
            - Alter
            - AlterConfigs
            - Create          # create topic
            - IdempotentWrite # pub message
          host: "*"
        
        # --- Topics: full admin UI ---
        - resource:
            type: topic
            name: "*"
            patternType: literal
          operations:
            - Read
            - Write
            - Create
            - Delete
            - Alter
            - Describe
            - DescribeConfigs
            - AlterConfigs
          host: "*"
          
        # --- Consumer groups ---
        - resource:
            type: group
            name: "*"
            patternType: literal
          operations:
            - Read
            - Describe
            - Delete
            - Alter  # reset offset
          host: "*"

  # user for KafkaConnect
  - name: connect
    authentication:
      type: scram-sha-512
    authorization:
      type: simple
      acls:
        - resource:
            type: cluster
          operations:
            - Describe
            - DescribeConfigs
            - IdempotentWrite # pub message
          host: "*"
          
        # Internal topics Connect
        - resource:
            type: topic
            name: "*"
            patternType: literal
          operations:
            - Read
            - Write
            - Create
            - Describe
            - Alter
            - AlterConfigs
          host: "*"
          
        # --- Consumer groups ---
        - resource:
            type: group
            name: "*"
            patternType: literal
          operations:
            - Read
            - Describe
            - Alter
          host: "*"

# KafkTopic
# Docs: https://strimzi.io/docs/operators/latest/configuring.html#type-KafkaTopic-reference
# name: metadata resources
# topicName: name of topics
# partitions: number of partitions
# config (optional): docs: https://kafka.apache.org/41/configuration/topic-configs/
# ---
# CONVENTION: 
# domain.entity.variant
# domain: business
# entity: orders, customers
# variant (optional): env, version: v1, raw, prod
topics:
  - name: cdc-order-topics
    topicName: cdc.orders
    partitions: 4