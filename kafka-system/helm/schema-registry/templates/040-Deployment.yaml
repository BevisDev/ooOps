apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sr.name" . }}-deployment
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sr.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.operator.replicas }}
  selector:
    matchLabels:
      {{- include "sr.labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sr.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: APICURIO_OPERATOR_WATCHED_NAMESPACES
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['olm.targetNamespaces']
        - name: QUARKUS_PROFILE
          value: prod
        - name: REGISTRY_APP_IMAGE
          value: {{ include "sr.image" (dict "registry" .Values.imageRegistry "repository" .Values.imageRepository "name" .Values.app.name "tag" .Values.app.tag) }}
        - name: REGISTRY_UI_IMAGE
          value: {{ include "sr.image" (dict "registry" .Values.imageRegistry "repository" .Values.imageRepository "name" .Values.ui.name "tag" .Values.ui.tag) }}
        - name: REGISTRY_GITOPS_SYNC_IMAGE
          value: {{ include "sr.image" (dict "registry" .Values.imageRegistry "repository" .Values.imageRepository "name" .Values.gitops.name "tag" .Values.gitops.tag) }}
        image: {{ include "sr.image" (dict "registry" .Values.imageRegistry "repository" .Values.imageRepository "name" .Values.operator.image.name "tag" .Values.operator.image.tag) }}
        {{- with .Values.imagePullPolicy }}
        imagePullPolicy: {{ . }}
        {{- end }}
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /q/health/live
            port: 8080
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 3
        name: apicurio-registry-operator
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /q/health/ready
            port: 8080
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 3
        resources:
          limits:
            cpu: 200m
            memory: 500Mi
          requests:
            cpu: 100m
            memory: 100Mi
        startupProbe:
          failureThreshold: 14
          httpGet:
            path: /q/health/started
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 3
      serviceAccountName: {{ include "sr.name" . }}-sa
