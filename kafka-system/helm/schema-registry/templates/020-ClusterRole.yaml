apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: apicurio-registry-operator-clusterrole
  labels:
    app: apicurio-registry-operator
    app.kubernetes.io/component: operator
    app.kubernetes.io/instance: apicurio-registry-operator
    app.kubernetes.io/name: apicurio-registry-operator
    app.kubernetes.io/part-of: apicurio-registry
    app.kubernetes.io/version: 3.3.0
rules:
- apiGroups:
  - registry.apicur.io
  resources:
  - apicurioregistries3
  - apicurioregistries3/status
  verbs:
  - '*'
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - '*'
- apiGroups:
  - events.k8s.io
  resources:
  - events
  verbs:
  - '*'
- apiGroups:
  - ""
  resources:
  - configmaps
  - pods
  - services
  - serviceaccounts
  verbs:
  - '*'
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - roles
  - rolebindings
  verbs:
  - '*'
- apiGroups:
  - apiextensions.k8s.io
  resourceNames:
  - apicurioregistries3.registry.apicur.io
  resources:
  - customresourcedefinitions
  verbs:
  - get
- apiGroups:
  - networking.k8s.io
  resources:
  - ingresses
  - networkpolicies
  verbs:
  - '*'
- apiGroups:
  - policy
  resources:
  - poddisruptionbudgets
  verbs:
  - '*'
- apiGroups:
  - autoscaling
  resources:
  - horizontalpodautoscalers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
  - get
  - list
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - create
  - update
  - patch
  - delete